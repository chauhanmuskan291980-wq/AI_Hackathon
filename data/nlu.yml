version: "3.1"

nlu:

- intent: ask_esic
  examples: |
    - am I eligible for ESIC
    - do I have ESIC
    - is ESIC applicable to me
    - check ESIC eligibility

- intent: inform_salary
  examples: |
    - my salary is [18000](salary)
    - I earn [25000](salary)
    - [21000](salary)
    - salary [20000](salary)

- intent: affirm
  examples: |
    - yes
    - yeah
    - correct
    - registered

- intent: deny
  examples: |
    - no
    - not registered
    - nope