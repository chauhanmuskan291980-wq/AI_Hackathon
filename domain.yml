version: "3.1"

intents:
  - ask_esic
  - inform_salary
  - affirm
  - deny

entities:
  - salary

slots:
  salary:
    type: float
    mappings:
      - type: from_entity
        entity: salary

  employer_registered:
    type: bool
    mappings:
      - type: from_intent
        intent: affirm
        value: true
      - type: from_intent
        intent: deny
        value: false

forms:
  esic_eligibility_form:
    required_slots:
      - salary
      - employer_registered

responses:

  utter_ask_salary:
    - text: "What is your monthly salary?"

  utter_ask_employer_registered:
    - text: "Is your employer registered under ESIC? (Yes/No)"

actions:
  - action_check_esic_eligibility